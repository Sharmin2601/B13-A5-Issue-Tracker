<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8">
        <div class="flex flex-col items-center mb-8">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-20 h-20 mb-4">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full h-12 bg-gray-50" />
                <p class="text-[10px] text-blue-600 mt-1 font-medium">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full h-12 bg-gray-50" />
                <p class="text-[10px] text-blue-600 mt-1 font-medium">Default: admin123</p>
            </div>
            <button onclick="login()" class="btn btn-primary w-full h-12 text-white font-bold capitalize bg-[#4F00FF] border-none">Sign In</button>
        </div>

        <div class="relative flex py-8 items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-xs">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="bg-gray-50 rounded-xl p-6 border border-gray-100 text-center text-sm">
            <p class="text-xs text-gray-400 font-bold uppercase mb-3">Demo Credentials:</p>
            <p class="text-gray-700 font-bold">Username: <span class="font-normal">admin</span></p>
            <p class="text-gray-700 font-bold">Password: <span class="font-normal">admin123</span></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
