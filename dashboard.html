<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .tab-btn { font-weight: 600; background-color: white; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .tab-active { background-color: #4F00FF !important; color: white !important; border-color: #4F00FF !important; }
        .issue-card { 
    background-color: white; 
    border-radius: 12px; 
    padding: 24px; 
    border-left: 1px solid #e5e7eb;
    border-right: 1px solid #e5e7eb;
    border-bottom: 1px solid #e5e7eb;
}
        .border-top-open { border-top: 4px solid #22c55e !important; }
         .border-top-closed { border-top: 4px solid #9333ea !important; }
        .issue-card:hover { transform: translateY(-4px); }
        .issue-card:hover.border-top-open { border-top-color: rgba(34, 197, 94, 1) !important; }
        .issue-card:hover.border-top-closed { border-top-color: rgba(147, 51, 234, 1) !important; }
        .skeleton {
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            border-radius: 8px; background-size: 200% 100%; animation: 1.5s shine linear infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body class="min-h-screen">
    <nav class="navbar bg-white border-b px-4 md:px-12 h-auto py-4 md:h-20 shadow-sm flex-col md:flex-row gap-4">
        <div class="flex-1 w-full flex justify-between md:justify-start">
            <div class="flex items-center gap-3">
                <img src="./assets/github-logo.png" alt="Logo" class="w-9 h-9">
                <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
            </div>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered flex-1 md:w-64 h-10 bg-gray-50 focus:outline-none" />
            <button onclick="searchIssues()" class="btn btn-sm h-10 px-6 bg-[#4F00FF] text-white border-none rounded-lg">Search</button>
        </div>
    </nav>
<main class="max-w-7xl mx-auto p-4 md:p-10">
    <div class="bg-white p-4 rounded-xl border mb-6 flex overflow-x-auto gap-[8px]">
    <button id="tab-all" onclick="changeTab('all')" class="tab-btn btn btn-sm px-8 tab-active rounded-lg h-10 shrink-0">All</button>
    <button id="tab-open" onclick="changeTab('open')" class="tab-btn btn btn-sm px-8 text-gray-500 rounded-lg h-10 shrink-0">Open</button>
    <button id="tab-closed" onclick="changeTab('closed')" class="tab-btn btn btn-sm px-8 text-gray-500 rounded-lg h-10 shrink-0">Closed</button>
</div>

        <div class="bg-white p-6 rounded-t-2xl border flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <img src="./assets/Aperture.png" alt="Aperture" class="w-10 h-10">
                <div id="issueCount">
                    <h1 class="text-2xl font-bold text-gray-900">0 Issues</h1>
                    <p class="text-sm text-gray-500 mt-1">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6 text-[11px] font-bold uppercase tracking-wider w-full sm:w-auto justify-center">
                <span class="flex items-center gap-2 text-green-600">
                    <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open
                </span>
                <span class="flex items-center gap-2 text-[#9333EA]">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#9333EA]"></span> Closed
                </span>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mt-6"></div>
    </main>
<dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl bg-white p-8 rounded-3xl">
            <div class="flex justify-between items-center mb-6">
                <span id="modalStatus" class="rounded-full px-4 py-0.5 text-white text-xs font-bold uppercase"></span>
                <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost">✕</button></form>
            </div>
            <h3 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-2"></h3>
            <p id="modalMeta" class="text-xs text-gray-400 mb-6"></p>
            
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-8 flex flex-wrap justify-between items-center gap-4">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Assignee:</p>
                    <p id="modalAssignee" class="font-bold text-gray-700 text-sm"></p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Priority:</p>
                    <span id="modalPriority" class="px-3 py-1 rounded-md text-[10px] font-bold uppercase inline-block"></span>
                </div>
            </div>

            <p class="text-xs font-bold text-gray-400 uppercase mb-2">Description</p>
            <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
        </div>
    </dialog>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
