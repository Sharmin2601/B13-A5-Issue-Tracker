<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        .tab-btn { font-weight: 600; background-color: white; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .tab-active { background-color: #4F00FF !important; color: white !important; border-color: #4F00FF !important; }
        .issue-card {
            background-color: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb; display: flex; flex-direction: column; 
            justify-content: space-between; transition: all 0.3s ease; height: 100%;
        }
        .border-top-open { border-top: 4px solid rgba(34, 197, 94, 0.5) !important; }
        .border-top-closed { border-top: 4px solid rgba(147, 51, 234, 0.5) !important; }
        .issue-card:hover { transform: translateY(-4px); }
        .issue-card:hover.border-top-open { border-top-color: rgba(34, 197, 94, 1) !important; }
        .issue-card:hover.border-top-closed { border-top-color: rgba(147, 51, 234, 1) !important; }
        .skeleton {
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            border-radius: 8px; background-size: 200% 100%; animation: 1.5s shine linear infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }
    </style>
</head>
<body class="min-h-screen">
    <nav class="navbar bg-white border-b px-4 md:px-12 h-auto py-4 md:h-20 shadow-sm flex-col md:flex-row gap-4">
        <div class="flex-1 w-full flex justify-between md:justify-start">
            <div class="flex items-center gap-3">
                <img src="./assets/github-logo.png" alt="Logo" class="w-9 h-9">
                <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
            </div>
        </div>
        <div class="flex gap-3 w-full md:w-auto">
            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered flex-1 md:w-64 h-10 bg-gray-50 focus:outline-none" />
            <button onclick="searchIssues()" class="btn btn-sm h-10 px-6 bg-[#4F00FF] text-white border-none rounded-lg">Search</button>
        </div>
    </nav>
